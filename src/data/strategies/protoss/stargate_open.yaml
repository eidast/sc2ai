name: stargate_open
race: Protoss
description: "Apertura con Stargate, transición a air-heavy. Fuerte contra Zerg."

initial_biases:
  gateway_units: 0.4
  stargate_units: 0.75
  robo_units: 0.15
  fast_expand: 0.4
  gas_heavy: 0.7
  air_upgrades: 0.8
  ground_upgrades: 0.2

scouting_adjustments:
  - condition: enemy_army_analysis.air_count > 5
    biases:
      stargate_units: 0.10
      air_upgrades: 0.10
  - condition: enemy_army_analysis.mechanical_count > enemy_army_analysis.biological_count
    biases:
      robo_units: 0.20
  - condition: enemy_army_analysis.ground_dps > 100
    biases:
      robo_units: 0.10
      gateway_units: 0.10

priority_formulas:
  STALKER: "gateway_units * 0.5 * (1 - own_ratio('STALKER'))"
  ZEALOT: "gateway_units * 0.3 * (1 - own_ratio('ZEALOT'))"
  PHOENIX: "stargate_units * 0.7 * (1 - own_ratio('PHOENIX'))"
  VOIDRAY: "stargate_units * 0.9 * (1 - own_ratio('VOIDRAY'))"
  ORACLE: "stargate_units * 0.5 * (has_enemy ? (1 - own_ratio('ORACLE')) : 0.1)"
  CARRIER: "stargate_units * 0.8 * air_upgrades * (game_time > 600 ? (1 - own_ratio('CARRIER')) : 0.1)"
  GATEWAY: "(gateway_units + (1 - robo_units) * 0.2) * (bases * 3 - has_structure('GATEWAY') * 2) / (bases * 3 + 1)"
  CYBERNETICSCORE: "gateway_units * (1 - has_structure('CYBERNETICSCORE'))"
  STARGATE: "stargate_units * (1 - max(0, has_structure('STARGATE') - bases) / (bases + 1)) * has_structure('CYBERNETICSCORE')"
  NEXUS: "fast_expand * 0.5 + (minerals > 500 ? 0.3 : 0)"
  PROBE: "(workers < 70 ? (1 - workers / 70) : 0)"
  PYLON: "supply_left < 4 ? 2.0 : 0.1"
  ASSIMILATOR: "gas_heavy * (has_structure('ASSIMILATOR') < bases * 2 ? 1 : 0)"

meta:
  bias_speed: 0.3
  scout_decay_rate: 0.05
  max_workers: 70
  target_bases: 4
